<!DOCTYPE html>
<html lang="en">

<head>
  <title>Form4: Change color</title>
  <script language="JavaScript">
    function changeColor() {
      var color = document.form4.color.value;
      document.body.style.backgroundColor = color;
    }
  </script>
</head>

<body>
  <div class="container">
    <h1>Change color</h1>
    <form name="form4" method="" action="">
      <input type="text" name="color">
      <input type="button" name="ok" value="OK" onclick="changeColor()">
    </form>
  </div>
</body>

<style>
  body {
    background-color: lightsalmon;
    color: salmon;
    font-family: Arial, Helvetica, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
  }

  .container {
    background-color: white;
    border: 2px solid salmon;
    border-radius: 4px;
    box-shadow: salmon 0px 3px 8px;
    padding: 20px;
    text-align: center;
  }

  h1 {
    text-align: center;
    text-transform: uppercase;
  }

  form {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  input {
    width: 100%;
    border: 1px solid salmon;
    border-radius: 4px;
    padding: 4px;
  }

  input[type="button"] {
    background-color: salmon;
    color: white;
    width: 80px;
    margin-top: 20px;
    cursor: pointer;
  }
</style>

</html>
