<!DOCTYPE html>
<html lang="en">

<head>
  <title>Form4: Change color</title>
  <script language="JavaScript">
    function changeColor() {
      var color = document.form4.color.value;
      document.bgColor = color;
    }
  </script>
</head>

<body style="background-color: pink">
  <div style="text-align: center;">
    <h1>Change color</h1>
    <form name="form4" method="" action="">
      <input type="text" name="color">
      <input type="button" name="ok" value="OK" onclick="changeColor()">
    </form>
  </div>
</body>

</html>
